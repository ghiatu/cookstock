name: Thai Stock Scan (cookstock)

on:
  workflow_dispatch: {}          # allows manual "Run workflow" button
  schedule:
    - cron: '0 10 * * 1-5'       # 17:00 Bangkok time (UTC+7), Mon-Fri, after SET closes

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cookstock (with yahoofinancials submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Thai stock scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python batch/cookStockPipeline_thai.py

      - name: Upload results as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-${{ github.run_id }}
          path: results/
